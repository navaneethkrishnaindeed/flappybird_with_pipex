name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/projects/flappy/"

      - name: Create projects/flappy directory structure
        run: |
          mkdir -p _site/projects/flappy
          cp -r build/web/* _site/projects/flappy/
          
          # Create a root index that redirects to /projects/flappy
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/projects/flappy/">
            <title>PipeX Projects</title>
            <style>
              body {
                font-family: system-ui, -apple-system, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                color: #fff;
              }
              a { color: #4fc3f7; }
            </style>
          </head>
          <body>
            <p>Redirecting to <a href="/projects/flappy/">Flappy Bird</a>...</p>
          </body>
          </html>
          EOF
          
          # Create projects index page
          cat > _site/projects/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>PipeX Projects</title>
            <style>
              * { box-sizing: border-box; }
              body {
                font-family: 'Segoe UI', system-ui, sans-serif;
                margin: 0;
                min-height: 100vh;
                background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
                color: #fff;
                padding: 2rem;
              }
              .container {
                max-width: 800px;
                margin: 0 auto;
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
                background: linear-gradient(90deg, #f093fb, #f5576c);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              }
              .subtitle {
                color: #aaa;
                margin-bottom: 3rem;
              }
              .projects {
                display: grid;
                gap: 1.5rem;
              }
              .project-card {
                background: rgba(255,255,255,0.05);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 16px;
                padding: 1.5rem;
                text-decoration: none;
                color: inherit;
                transition: all 0.3s ease;
              }
              .project-card:hover {
                background: rgba(255,255,255,0.1);
                transform: translateY(-4px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
              }
              .project-card h2 {
                margin: 0 0 0.5rem 0;
                color: #4fc3f7;
              }
              .project-card p {
                margin: 0;
                color: #ccc;
              }
              .tag {
                display: inline-block;
                background: rgba(79, 195, 247, 0.2);
                color: #4fc3f7;
                padding: 0.25rem 0.75rem;
                border-radius: 20px;
                font-size: 0.8rem;
                margin-top: 1rem;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎮 PipeX Projects</h1>
              <p class="subtitle">Games & experiments built with Flutter + PipeX</p>
              
              <div class="projects">
                <a href="/projects/flappy/" class="project-card">
                  <h2>🐦 Flappy Bird</h2>
                  <p>Classic Flappy Bird clone built with Flutter and PipeX state management using MVC architecture.</p>
                  <span class="tag">Flutter</span>
                  <span class="tag">PipeX</span>
                  <span class="tag">Game</span>
                </a>
                <!-- Add more projects here -->
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Add CNAME
        run: echo "pipex.navaneethk.dev" > _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
