name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/projects/flappy/"

      - name: Create site structure
        run: |
          # Create directories
          mkdir -p _site/projects/flappy
          mkdir -p _site/wafeka
          
          # Copy Flappy Bird game
          cp -r build/web/* _site/projects/flappy/
          
          # Copy Wafeka Analysis Dashboard
          cp -r analysys/* _site/wafeka/
          
          # Create root landing page
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>PipeX Hub - Navaneeth K</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
                min-height: 100vh;
                background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
                color: #fff;
                padding: 3rem 2rem;
              }
              .container { max-width: 900px; margin: 0 auto; }
              h1 {
                font-size: 3rem;
                margin-bottom: 0.5rem;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
              }
              .subtitle { color: #888; margin-bottom: 3rem; font-size: 1.1rem; }
              .projects { display: grid; gap: 1.5rem; }
              .card {
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 20px;
                padding: 2rem;
                text-decoration: none;
                color: inherit;
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                overflow: hidden;
              }
              .card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 3px;
                background: linear-gradient(90deg, var(--accent), var(--accent2));
                opacity: 0;
                transition: opacity 0.3s;
              }
              .card:hover::before { opacity: 1; }
              .card:hover {
                background: rgba(255,255,255,0.06);
                transform: translateY(-6px);
                box-shadow: 0 25px 50px rgba(0,0,0,0.4);
              }
              .card-game { --accent: #4fc3f7; --accent2: #00e676; }
              .card-data { --accent: #f093fb; --accent2: #f5576c; }
              .card h2 { font-size: 1.5rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
              .card p { color: #aaa; line-height: 1.6; }
              .tags { margin-top: 1.25rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
              .tag {
                background: rgba(255,255,255,0.08);
                padding: 0.35rem 0.85rem;
                border-radius: 20px;
                font-size: 0.8rem;
                color: #ccc;
              }
              .footer { margin-top: 4rem; text-align: center; color: #555; font-size: 0.9rem; }
              .footer a { color: #667eea; text-decoration: none; }
              .footer a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🚀 PipeX Hub</h1>
              <p class="subtitle">Projects & experiments by Navaneeth K</p>
              
              <div class="projects">
                <a href="/projects/flappy/" class="card card-game">
                  <h2>🐦 Flappy Bird</h2>
                  <p>Classic Flappy Bird clone showcasing PipeX state management for smooth 60fps gameplay in Flutter.</p>
                  <div class="tags">
                    <span class="tag">Flutter</span>
                    <span class="tag">PipeX</span>
                    <span class="tag">Game</span>
                    <span class="tag">Web</span>
                  </div>
                </a>
                
                <a href="/wafeka/" class="card card-data">
                  <h2>📊 Wafeka Analytics</h2>
                  <p>Comprehensive data analysis dashboard with correlation, regression, factor analysis, and executive insights.</p>
                  <div class="tags">
                    <span class="tag">Analytics</span>
                    <span class="tag">Dashboard</span>
                    <span class="tag">Data Science</span>
                  </div>
                </a>
              </div>
              
              <div class="footer">
                <p>Built by <a href="https://navaneethk.dev">Navaneeth K</a> · <a href="https://github.com/navaneethkrishnaindeed">GitHub</a> · <a href="https://resume.navaneethk.dev">Resume</a></p>
              </div>
            </div>
          </body>
          </html>
          EOF
          
          # Create projects index page
          cat > _site/projects/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/projects/flappy/">
            <title>Projects</title>
          </head>
          <body>
            <p>Redirecting to <a href="/projects/flappy/">Flappy Bird</a>...</p>
          </body>
          </html>
          EOF

      - name: Add CNAME
        run: echo "pipex.navaneethk.dev" > _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
